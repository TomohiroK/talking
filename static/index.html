<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoTalk</title>
  <style>
    /* Design Tokens */
    :root {
      --color-bg-app: #111111;
      --color-bg-card: #1e1e1e;
      --color-border-subtle: rgba(255,255,255,0.08);
      --color-text-primary: #f0f0f0;
      --color-text-secondary: rgba(255,255,255,0.55);
      --color-text-muted: rgba(255,255,255,0.35);

      --color-angie-primary: #e040fb;
      --color-angie-glow: rgba(224,64,251,0.35);
      --gradient-angie: linear-gradient(135deg, #e040fb 0%, #7c4dff 100%);
      --gradient-angie-card: linear-gradient(160deg, rgba(224,64,251,0.12) 0%, rgba(124,77,255,0.06) 100%);

      --color-andy-primary: #ff6d00;
      --color-andy-glow: rgba(255,109,0,0.35);
      --gradient-andy: linear-gradient(135deg, #ff6d00 0%, #ffd600 100%);
      --gradient-andy-card: linear-gradient(160deg, rgba(255,109,0,0.12) 0%, rgba(255,214,0,0.06) 100%);

      --radius-card: 20px;
      --radius-badge: 100px;
      --radius-btn: 16px;
      --duration-normal: 250ms;
      --duration-fast: 150ms;
      --ease-out: cubic-bezier(0.2,0,0,1);
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--color-bg-app);
      color: var(--color-text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Status bar & back button */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #back-btn {
      display: none; background: none; border: 1px solid rgba(255,255,255,0.15);
      color: #aaa; font-size: 14px; padding: 4px 10px; border-radius: 8px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all var(--duration-fast) var(--ease-out);
    }
    #back-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    #back-btn.visible { display: block; }
    #status { flex: 1; text-align: center; font-size: 14px; color: #888; padding: 4px 0; }
    #conversation { flex: 1; display: none; overflow: hidden; margin-top: 40px; }
    #conversation.active { display: flex; }
    #transcript { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 15px; line-height: 1.4; }
    .msg.user { background: #1a5276; align-self: flex-end; }
    .msg.ai { background: #1e3a2f; align-self: flex-start; }
    .msg.error { background: #5c1a1a; align-self: center; font-size: 13px; }
    .msg__translation {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.5);
    }
    .msg__highlight {
      color: #ffd54f;
      font-weight: 700;
    }

    /* Trend topic chips */
    .trend-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 0;
      align-items: flex-start;
    }
    .trend-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      letter-spacing: 0;
    }
    .trend-chips {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .trend-chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 1.4;
      cursor: pointer;
      text-align: left;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: normal;
    }
    .trend-chip:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .trend-chip:active {
      transform: scale(0.97);
    }
    .trend-chip--active {
      border-color: rgba(224,64,251,0.5);
      background: rgba(224,64,251,0.12);
    }

    /* Mic toggle button */
    #mic-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      padding: 14px 28px;
      border-radius: var(--radius-badge);
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(30,30,30,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--color-text-primary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }
    #mic-toggle:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(50,50,50,0.9);
    }
    #mic-toggle.visible { display: block; }
    #mic-toggle.muted {
      border-color: rgba(239,68,68,0.5);
      background: rgba(127,29,29,0.8);
    }
    #mic-toggle.muted:hover {
      border-color: rgba(239,68,68,0.7);
      background: rgba(153,27,27,0.9);
    }

    /* Word list panel */
    #wordpanel {
      width: 240px;
      border-left: 1px solid var(--color-border-subtle);
      background: var(--color-bg-card);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .wordpanel__header {
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .wordpanel__count {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      background: rgba(255,255,255,0.06);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .wordpanel__list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 4px;
    }
    .word-chip {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.3;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: var(--color-text-secondary);
      transition: all var(--duration-fast) var(--ease-out);
      user-select: none;
    }
    .word-chip:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--color-text-primary);
    }
    .word-chip.bookmarked {
      background: rgba(255, 214, 0, 0.15);
      border-color: rgba(255, 214, 0, 0.4);
      color: #ffd600;
    }

    /* Mobile: toggle button + overlay panel */
    #wordpanel-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-subtle);
      color: var(--color-text-primary);
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 640px) {
      #wordpanel {
        position: fixed;
        top: 0; right: 0; bottom: 0;
        width: 260px;
        z-index: 20;
        transform: translateX(100%);
        transition: transform var(--duration-normal) var(--ease-out);
        box-shadow: -4px 0 20px rgba(0,0,0,0.5);
      }
      #wordpanel.open { transform: translateX(0); }
      #wordpanel-toggle { display: flex; }
    }

    /* Controls — character select */
    #controls {
      flex: 1;
      padding: 24px 16px;
      padding-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      overflow-y: auto;
    }
    #controls.hidden { display: none; }
    .controls__header { margin-top: auto; }
    .controls__cards { margin-bottom: auto; }
    #char-config { margin-bottom: auto; width: 100%; max-width: 520px; }
    .controls__header { text-align: center; display: flex; flex-direction: column; gap: 8px; }
    .controls__eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-muted); }
    .controls__title { font-size: clamp(22px,5vw,28px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    .controls__subtitle { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }

    .controls__cards {
      width: 100%;
      max-width: 520px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 440px) {
      .controls__cards { grid-template-columns: 1fr 1fr; gap: 12px; }
    }

    /* Character Card */
    .char-card {
      position: relative;
      border-radius: var(--radius-card);
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-subtle);
      padding: 32px 24px 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      overflow: hidden;
      outline: none;
      transition:
        transform var(--duration-normal) var(--ease-spring),
        box-shadow var(--duration-normal) var(--ease-out),
        border-color var(--duration-normal) var(--ease-out);
    }
    .char-card[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    /* Card gradient tint */
    .char-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }
    /* Top glow */
    .char-card::after {
      content: "";
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 80px;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.5;
      transition: opacity var(--duration-normal) var(--ease-out);
      pointer-events: none;
    }

    /* Angie variant */
    .char-card--angie::before { background: var(--gradient-angie-card); }
    .char-card--angie::after { background: var(--color-angie-primary); }

    /* Andy variant */
    .char-card--andy::before { background: var(--gradient-andy-card); }
    .char-card--andy::after { background: var(--color-andy-primary); }

    /* Hover/Focus */
    .char-card:hover, .char-card:focus-visible { transform: translateY(-6px) scale(1.02); }
    .char-card--angie:hover, .char-card--angie:focus-visible {
      border-color: rgba(224,64,251,0.5);
      box-shadow: 0 0 0 1px rgba(224,64,251,0.3), 0 20px 60px -10px rgba(224,64,251,0.4), 0 8px 20px -4px rgba(0,0,0,0.6);
    }
    .char-card--andy:hover, .char-card--andy:focus-visible {
      border-color: rgba(255,109,0,0.5);
      box-shadow: 0 0 0 1px rgba(255,109,0,0.3), 0 20px 60px -10px rgba(255,109,0,0.35), 0 8px 20px -4px rgba(0,0,0,0.6);
    }
    .char-card:hover::after, .char-card:focus-visible::after { opacity: 0.9; }
    .char-card:active { transform: translateY(-2px) scale(0.98); transition-duration: var(--duration-fast); }

    /* Avatar */
    .char-card__avatar {
      position: relative; z-index: 1;
      font-size: clamp(52px,12vw,64px); line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform var(--duration-normal) var(--ease-spring);
      user-select: none; pointer-events: none;
    }
    .char-card:hover .char-card__avatar { transform: scale(1.1) rotate(-4deg); }
    .char-card--andy:hover .char-card__avatar { transform: scale(1.1) rotate(4deg); }

    /* Name — gradient text */
    .char-card__name {
      position: relative; z-index: 1;
      font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1;
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      pointer-events: none;
    }
    .char-card--angie .char-card__name { background-image: var(--gradient-angie); }
    .char-card--andy .char-card__name { background-image: var(--gradient-andy); }

    /* Description */
    .char-card__desc {
      position: relative; z-index: 1;
      font-size: 13px; line-height: 1.6; color: var(--color-text-secondary);
      pointer-events: none;
    }

    /* Voice badge */
    .char-card__badge {
      position: relative; z-index: 1;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px 4px 8px;
      border-radius: var(--radius-badge);
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      pointer-events: none;
    }
    .char-card__badge-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      animation: badge-pulse 2s ease-in-out infinite;
    }
    .char-card--angie .char-card__badge { background: rgba(224,64,251,0.15); color: #e77ff5; border: 1px solid rgba(224,64,251,0.25); }
    .char-card--angie .char-card__badge-dot { background: var(--color-angie-primary); }
    .char-card--andy .char-card__badge { background: rgba(255,109,0,0.15); color: #ff9a50; border: 1px solid rgba(255,109,0,0.25); }
    .char-card--andy .char-card__badge-dot { background: var(--color-andy-primary); }

    /* CTA button */
    .char-card__cta {
      position: relative; z-index: 1;
      width: 100%;
      padding: 11px 16px;
      border-radius: var(--radius-btn);
      font-size: 14px; font-weight: 700; letter-spacing: 0.01em;
      color: #fff; border: none; cursor: pointer;
      white-space: nowrap;
      pointer-events: none;
    }
    .char-card--angie .char-card__cta { background: var(--gradient-angie); box-shadow: 0 4px 20px -4px var(--color-angie-glow); }
    .char-card--andy .char-card__cta { background: var(--gradient-andy); box-shadow: 0 4px 20px -4px var(--color-andy-glow); color: #1a0a00; }
    .char-card:hover .char-card__cta { opacity: 0.92; }

    @keyframes badge-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    /* Language selector */
    .lang-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .lang-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-badge);
      border: 1px solid var(--color-border-subtle);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .lang-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--color-text-primary); }
    .lang-btn--active {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
      color: var(--color-text-primary);
      font-weight: 700;
    }
    .lang-btn__flag { font-size: 16px; }

    /* Age selector */
    .age-selector {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .age-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius-badge);
      border: 1px solid var(--color-border-subtle);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .age-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--color-text-primary); }
    .age-btn--active {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
      color: var(--color-text-primary);
      font-weight: 700;
    }

    /* Personality sliders */
    .personality-panel {
      width: 100%;
      margin-top: 16px;
    }
    .personality-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 8px 0;
    }
    .personality-panel__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
    }
    .personality-panel__toggle {
      font-size: 11px;
      color: var(--color-text-secondary);
      transition: transform var(--duration-fast) var(--ease-out);
    }
    .personality-panel__toggle.open { transform: rotate(180deg); }
    .personality-panel__body {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding-top: 4px;
    }
    .personality-panel__body.open { display: flex; }
    .personality-slider {
      display: grid;
      grid-template-columns: 28px 1fr 24px;
      align-items: center;
      gap: 8px;
    }
    .personality-slider__icon {
      font-size: 16px;
      text-align: center;
    }
    .personality-slider__range {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
      outline: none;
    }
    .personality-slider__range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--color-accent-primary);
      cursor: pointer;
      border: 2px solid var(--color-bg-primary);
      box-shadow: 0 0 6px rgba(224,64,251,0.4);
    }
    .personality-slider__range::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--color-accent-primary);
      cursor: pointer;
      border: 2px solid var(--color-bg-primary);
      box-shadow: 0 0 6px rgba(224,64,251,0.4);
    }
    .personality-slider__val {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-primary);
      text-align: center;
      min-width: 16px;
    }

    .char-config__selected {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 12px;
    }
    .start-btn {
      width: 100%;
      padding: 14px 0;
      border: none;
      border-radius: var(--radius-card);
      background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      white-space: nowrap;
      transition: opacity var(--duration-fast) var(--ease-out);
    }
    .start-btn:hover { opacity: 0.9; }
    .start-btn:active { transform: scale(0.98); }
    .back-to-select-btn {
      width: 100%;
      padding: 10px 0;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-card);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .back-to-select-btn:hover { color: var(--color-text-primary); border-color: rgba(255,255,255,0.3); }

    .personality-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .personality-action-btn {
      flex: 1;
      padding: 7px 0;
      border-radius: var(--radius-badge);
      border: 1px solid rgba(224,64,251,0.4);
      background: rgba(224,64,251,0.1);
      color: var(--color-text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .personality-action-btn:hover { background: rgba(224,64,251,0.2); }
    .personality-action-btn--ghost {
      border-color: var(--color-border-subtle);
      background: transparent;
      color: var(--color-text-secondary);
    }
    .personality-action-btn--ghost:hover { background: rgba(255,255,255,0.06); }
    .personality-save-msg {
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: center;
      min-height: 16px;
    }

    /* Countdown overlay */
    #countdown-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #countdown-overlay.active { display: flex; }
    #countdown-num {
      font-size: clamp(120px, 30vw, 220px);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #countdown-num.pop {
      animation: countdown-pop 0.7s var(--ease-spring) forwards;
    }
    #countdown-label {
      margin-top: 16px;
      font-size: clamp(15px, 3.5vw, 20px);
      color: var(--color-text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #countdown-num.final {
      font-size: clamp(52px, 14vw, 90px);
      background: linear-gradient(135deg, #ffd54f 0%, #ff6d00 40%, #e040fb 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      animation: countdown-final 0.6s var(--ease-spring) forwards;
    }
    @keyframes countdown-pop {
      0% { opacity: 0; transform: scale(3.5) rotate(-8deg); filter: blur(8px); }
      40% { opacity: 1; filter: blur(0); }
      70% { transform: scale(0.9) rotate(2deg); }
      85% { transform: scale(1.05) rotate(-1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }
    @keyframes countdown-final {
      0% { opacity: 0; transform: scale(0.3) translateY(40px); }
      50% { transform: scale(1.15) translateY(-10px); }
      70% { transform: scale(0.95) translateY(0); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes countdown-fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .char-card, .char-card::after, .char-card .char-card__avatar, .char-card__badge-dot {
        transition: none; animation: none;
      }
      .char-card:hover, .char-card:focus-visible { transform: none; }

  <script>
    let ws = null;
    let audioCtx = null;
    let mediaStream = null;
    let scriptNode = null;
    let isRecording = false;

    let currentAiMsg = null;
    let currentAiText = "";
    let awaitingTranslation = null;
    let lateTranslateTimer = null;

    // Language & age state
    let selectedLang = "en";
    let currentLang = "en";

    // Trend topics (fetched asynchronously)
    let trendTopics = null;
    const FREE_TALK = "__free__";
    let selectedTopic = null;
    let selectedAge = "adult";

    (async () => {
      try {
        const res = await fetch("/api/trends");
        if (res.ok) {
          trendTopics = await res.json();
          renderTrendChips();
        }
      } catch (e) { /* trends are optional */ }
    })();

    // Character prompts (moved from server — not secret)
    const CHARACTER_PROMPTS = {
      Kore: {
        en: "You are Angie, a pop singer living in LA. You're super upbeat, energetic, and fun to talk to. You love music, fashion, and social media. You use trendy slang and expressions naturally. Always respond in English. The user is a native Japanese speaker. Their audio input is in Japanese. Understand their Japanese speech and always respond in English. Keep responses concise (1-3 sentences). If you notice grammar mistakes, casually mention the correct way to say it like a friend would.",
        id: "You are Angie, a pop singer living in LA. You're super upbeat, energetic, and fun to talk to. You love music, fashion, and social media. Always respond in Indonesian (Bahasa Indonesia). Use natural, casual Indonesian with common slang. The user is a native Japanese speaker. Their audio input is in Japanese \u2014 not Korean. Understand their Japanese speech and always respond in Indonesian. Keep responses concise (1-3 sentences). If you notice grammar mistakes, casually mention the correct way to say it like a friend would.",
        ja: "You are Angie, a young woman born and raised in Kyoto. You speak in gentle Kyoto dialect (京言葉). You appear soft-spoken and graceful, but you have a strong inner core and quiet pride in your heritage. You master the art of honne (true feelings) and tatemae (polite facade) — you never criticize directly but use elegant, indirect expressions to hint at your real opinion (ikezu style). You have exquisite taste and aesthetic sense, preferring understated quality over flashiness. You value 'shimatsu' (frugality with elegance) — never wasteful, always resourceful. You're reserved with strangers but deeply warm once trust is built. Always respond in Japanese using natural Kyoto dialect expressions (e.g., ～どす, ～はる, おおきに, よろしゅうおたのもうします). Keep responses concise (1-3 sentences). The user is a native Japanese speaker. Their audio input is in Japanese.",
      },
      Puck: {
        en: "You are Andy, a street food YouTuber based in NYC. You're chill, funny, and love talking about food, travel, and city life. You have great stories and use casual, natural English. Always respond in English. The user is a native Japanese speaker. Their audio input is in Japanese. Understand their Japanese speech and always respond in English. Keep responses concise (1-3 sentences). If you notice grammar mistakes, casually mention the correct way to say it like a buddy would.",
        id: "You are Andy, a street food YouTuber based in NYC. You're chill, funny, and love talking about food, travel, and city life. You have great stories. Always respond in Indonesian (Bahasa Indonesia). Use natural, casual Indonesian. The user is a native Japanese speaker. Their audio input is in Japanese \u2014 not Korean. Understand their Japanese speech and always respond in Indonesian. Keep responses concise (1-3 sentences). If you notice grammar mistakes, casually mention the correct way to say it like a buddy would.",
        ja: "You are Andy, a lively guy born and raised in Osaka. Humor is your lifeblood — every conversation needs an 'ochi' (punchline), and you naturally slip into boke-tsukkomi banter. You have incredible service spirit and fear awkward silence more than anything. You're a proud cost-conscious rationalist — you brag about how cheap you got things, not how expensive they are ('kore, jitsu wa 500-en yatten!' is your favorite flex). You're warm-hearted to a fault — nosy, generous, can't ignore someone in trouble. You're energetic, loud, use big gestures, and love flashy things. Always respond in Japanese using natural Osaka dialect (関西弁) expressions (e.g., ～やねん, ～やで, なんでやねん, ほんまに, めっちゃ, ええやん). Keep responses concise (1-3 sentences). The user is a native Japanese speaker. Their audio input is in Japanese.",
      },
    };

    // Age-based prompt modifiers appended to the character prompt
    const AGE_MODIFIERS = {
      toddler: "IMPORTANT: The listener is a very young child (under 6 years old). Use only the simplest words (cat, dog, big, small, yummy, fun). Keep every sentence under 5 words. Speak in a very warm, gentle, encouraging tone. Never correct grammar — just repeat the correct form naturally. Talk about animals, colors, food, and family. Celebrate everything they say with enthusiasm.",
      teen: "IMPORTANT: The listener is a school-age child (7-15 years old). Use simple but varied vocabulary. Keep sentences short (under 10 words). Be encouraging and patient. When correcting grammar, do it gently like a friendly tutor. Use topics they might like: games, school, sports, animals, movies.",
      young: "IMPORTANT: The listener is a young adult (16-25 years old). Use natural conversational language with some slang. Keep it casual and relatable. Talk about trending topics, social media, career, travel. Correct grammar casually like a friend would.",
      adult: "", // default — no modifier
    };

    // Personality parameter system
    const PERSONALITY_PARAMS = [
      { key: "energy",        label: "テンション",   icon: "\u26A1" },
      { key: "talkativeness", label: "おしゃべり度", icon: "\uD83D\uDCAC" },
      { key: "correction",    label: "ツッコミ度",   icon: "\u270F\uFE0F" },
      { key: "humor",         label: "ノリ",         icon: "\uD83D\uDE02" },
      { key: "closeness",     label: "親しさ",       icon: "\uD83E\uDD1D" },
      { key: "pacing",        label: "スピード",     icon: "\uD83C\uDFC3" },
    ];

    const PERSONALITY_DEFAULTS = {
      Kore: {
        en: { energy: 5, talkativeness: 4, correction: 3, humor: 3, closeness: 4, pacing: 4 },
        id: { energy: 5, talkativeness: 4, correction: 3, humor: 3, closeness: 4, pacing: 4 },
        ja: { energy: 2, talkativeness: 3, correction: 2, humor: 2, closeness: 2, pacing: 2 },
      },
      Puck: {
        en: { energy: 3, talkativeness: 4, correction: 3, humor: 4, closeness: 4, pacing: 3 },
        id: { energy: 3, talkativeness: 4, correction: 3, humor: 4, closeness: 4, pacing: 3 },
        ja: { energy: 5, talkativeness: 5, correction: 3, humor: 5, closeness: 4, pacing: 4 },
      },
    };

    const PERSONALITY_MODIFIERS = {
      energy: {
        1: "Be very calm, relaxed, and mellow. Speak in a soothing, unhurried tone. No exclamation marks.",
        2: "Be fairly calm and composed. Keep energy moderate. Use a warm but relaxed tone.",
        4: "Be upbeat and energetic. Show enthusiasm in your responses. Use exclamation marks naturally.",
        5: "Be SUPER energetic and hyped! Show maximum enthusiasm. Use exclamations freely. Your energy is infectious!",
      },
      talkativeness: {
        1: "Keep responses very short — just 1 sentence. Be a person of few words. Let silence be comfortable.",
        2: "Keep responses brief — 1-2 sentences max. Don't elaborate unless asked.",
        4: "Feel free to elaborate a bit. 2-4 sentences is fine. Add details and follow-up questions.",
        5: "Be very talkative! Elaborate on topics, share stories, add multiple follow-up questions. 3-5 sentences.",
      },
      correction: {
        1: "Never correct grammar or pronunciation. Just keep the conversation flowing naturally. Prioritize fun.",
        2: "Rarely correct grammar. Only mention it if the meaning is unclear. Keep corrections very gentle.",
        4: "Actively but kindly correct grammar mistakes. After responding to content, briefly note the correction.",
        5: "Be a strict but caring language coach. Correct every grammar mistake immediately. Provide the correct form and briefly explain why.",
      },
      humor: {
        1: "Be serious and straightforward. No jokes or humor. Focus on meaningful, thoughtful conversation.",
        2: "Be mostly serious with occasional light humor. Keep wit subtle and dry.",
        4: "Be funny and playful. Crack jokes, use wordplay, keep things lighthearted. Make the user laugh.",
        5: "Be hilarious! Every response should have humor — puns, jokes, funny observations, exaggerated reactions. Comedy is your top priority.",
      },
      closeness: {
        1: "Be polite and formal. Use respectful language. Keep professional distance. Address the user formally.",
        2: "Be friendly but maintain some formality. Warm but not overly casual.",
        4: "Be very friendly and casual, like a close friend. Use informal language, nicknames, and casual expressions.",
        5: "Be like a childhood best friend. Super casual, use slang freely, tease playfully, share personal stories. No filter.",
      },
      pacing: {
        1: "Speak very slowly and clearly. Pause between ideas. Repeat key words. Perfect for beginners.",
        2: "Speak at a relaxed, measured pace. Enunciate clearly. Give the listener time to process.",
        4: "Speak at a natural, brisk pace. Don't slow down unnecessarily. Keep the conversation moving.",
        5: "Speak fast and energetically! Quick responses, rapid-fire banter. Keep up the tempo. No pauses.",
      },
    };

    let personalityValues = {};
    let lastSelectedVoice = null;

    async function initPersonality(voice, lang) {
      const defaults = PERSONALITY_DEFAULTS[voice]?.[lang];
      if (!defaults) return;
      const saved = await loadSavedPersonality(voice, lang);
      personalityValues = saved ? { ...saved } : { ...defaults };
      lastSelectedVoice = voice;
      renderPersonalitySliders();
    }

    const CHAR_NAMES = { Kore: "Angie", Puck: "Andy" };

    async function selectChar(voice) {
      lastSelectedVoice = voice;
      // Show config screen immediately, load personality async
      document.querySelector(".controls__cards").style.display = "none";
      document.getElementById("char-config").style.display = "block";
      document.getElementById("char-config-name").textContent =
        (voice === "Kore" ? "\uD83D\uDC69" : "\uD83D\uDC68") + " " + CHAR_NAMES[voice] + " \u3068\u4F1A\u8A71\u6E96\u5099";
      document.getElementById("start-btn").textContent = CHAR_NAMES[voice] + "\u3068\u8A71\u3059 \u25B6";
      await initPersonality(voice, selectedLang);
      renderTrendChips();
    }

    function backToSelect() {
      document.querySelector(".controls__cards").style.display = "";
      document.getElementById("char-config").style.display = "none";
    }

    function renderPersonalitySliders() {
      const body = document.getElementById("personality-sliders");
      if (!body) return;
      body.innerHTML = "";
      for (const p of PERSONALITY_PARAMS) {
        const row = document.createElement("div");
        row.className = "personality-slider";
        const icon = document.createElement("span");
        icon.className = "personality-slider__icon";
        icon.textContent = p.icon;
        icon.title = p.label;
        const range = document.createElement("input");
        range.type = "range";
        range.className = "personality-slider__range";
        range.min = 1;
        range.max = 5;
        range.step = 1;
        range.value = personalityValues[p.key] || 3;
        range.dataset.key = p.key;
        const val = document.createElement("span");
        val.className = "personality-slider__val";
        val.textContent = range.value;
        range.oninput = () => {
          personalityValues[p.key] = Number(range.value);
          val.textContent = range.value;
        };
        row.appendChild(icon);
        row.appendChild(range);
        row.appendChild(val);
        body.appendChild(row);
      }
    }

    function togglePersonalityPanel() {
      const body = document.getElementById("personality-body");
      const toggle = document.getElementById("personality-toggle");
      body.classList.toggle("open");
      toggle.classList.toggle("open");
    }

    // IndexedDB persistence for personality settings
    const PERSONALITY_DB_NAME = "echotalk";
    const PERSONALITY_DB_VERSION = 1;
    const PERSONALITY_STORE = "personality";

    function openPersonalityDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(PERSONALITY_DB_NAME, PERSONALITY_DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(PERSONALITY_STORE)) {
            db.createObjectStore(PERSONALITY_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbKey(voice, lang) { return voice + ":" + lang; }

    async function savePersonality() {
      if (!lastSelectedVoice) return;
      try {
        const db = await openPersonalityDB();
        const tx = db.transaction(PERSONALITY_STORE, "readwrite");
        tx.objectStore(PERSONALITY_STORE).put({ ...personalityValues }, dbKey(lastSelectedVoice, selectedLang));
        await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = reject; });
        db.close();
      } catch (e) { /* graceful degradation */ }
      const msg = document.getElementById("personality-save-msg");
      msg.textContent = "\u2713 \u4FDD\u5B58\u3057\u307E\u3057\u305F";
      setTimeout(() => { msg.textContent = ""; }, 2000);
    }

    async function resetPersonality() {
      if (!lastSelectedVoice) return;
      const defaults = PERSONALITY_DEFAULTS[lastSelectedVoice]?.[selectedLang];
      if (!defaults) return;
      personalityValues = { ...defaults };
      renderPersonalitySliders();
      try {
        const db = await openPersonalityDB();
        const tx = db.transaction(PERSONALITY_STORE, "readwrite");
        tx.objectStore(PERSONALITY_STORE).delete(dbKey(lastSelectedVoice, selectedLang));
        await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = reject; });
        db.close();
      } catch (e) { /* graceful degradation */ }
      const msg = document.getElementById("personality-save-msg");
      msg.textContent = "\u2713 \u521D\u671F\u5024\u306B\u623B\u3057\u307E\u3057\u305F";
      setTimeout(() => { msg.textContent = ""; }, 2000);
    }

    async function loadSavedPersonality(voice, lang) {
      try {
        const db = await openPersonalityDB();
        const tx = db.transaction(PERSONALITY_STORE, "readonly");
        const req = tx.objectStore(PERSONALITY_STORE).get(dbKey(voice, lang));
        const result = await new Promise((resolve, reject) => { req.onsuccess = () => resolve(req.result); req.onerror = reject; });
        db.close();
        return result || null;
      } catch (e) { return null; }
    }

    function buildPersonalityPrompt() {
      return Object.entries(personalityValues)
        .filter(([_, val]) => val !== 3)
        .map(([key, val]) => PERSONALITY_MODIFIERS[key]?.[val])
        .filter(Boolean)
        .join(" ");
    }

    function getSystemPrompt(voice, lang) {
      const base = CHARACTER_PROMPTS[voice]?.[lang] || CHARACTER_PROMPTS.Kore.en;
      const modifier = AGE_MODIFIERS[selectedAge] || "";
      let trendHint = "";
      if (selectedTopic === FREE_TALK) {
        trendHint = ""; // Free talk: no topic guidance
      } else if (selectedTopic) {
        trendHint = "IMPORTANT: The user has chosen this topic to talk about. Start the conversation by naturally bringing up this topic: \"" + selectedTopic + "\". Greet the user and smoothly lead into this topic.";
      } else if (trendTopics?.[selectedAge]) {
        const topics = trendTopics[selectedAge];
        trendHint = "CONVERSATION TOPICS: Here are some trending topics in Japan you can naturally bring up during the conversation to keep it engaging. Don't force them — weave them in when relevant:\n" + topics.map((t, i) => (i + 1) + ". " + t).join("\n");
      }
      const personalityMod = buildPersonalityPrompt();
      return [base, modifier, personalityMod, trendHint].filter(Boolean).join("\n\n");
    }

    function selectLang(lang) {
      selectedLang = lang;
      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("lang-btn--active", btn.dataset.lang === lang);
      });
      if (lastSelectedVoice && document.getElementById("char-config").style.display !== "none") {
        initPersonality(lastSelectedVoice, lang); // async — fire-and-forget OK here, sliders update when ready
      }
    }

    function selectAge(age) {
      selectedAge = age;
      selectedTopic = null;
      document.querySelectorAll(".age-btn").forEach(btn => {
        btn.classList.toggle("age-btn--active", btn.dataset.age === age);
      });
      renderTrendChips();
    }

    // Mic toggle labels per language
    const MIC_LABELS = {
      en: { pause: "Pause", resume: "Resume" },
      id: { pause: "Jeda", resume: "Lanjut" },
      ja: { pause: "停止", resume: "再開" },
    };

    function toggleMic() {
      const btn = document.getElementById("mic-toggle");
      if (isRecording) {
        isRecording = false;
        btn.classList.add("muted");
        updateMicLabel();
      } else {
        isRecording = true;
        btn.classList.remove("muted");
        updateMicLabel();
      }
    }

    function updateMicLabel() {
      const btn = document.getElementById("mic-toggle");
      const labels = MIC_LABELS[currentLang] || MIC_LABELS.en;
      if (isRecording) {
        btn.textContent = "\uD83C\uDF99\uFE0F " + labels.pause;
      } else {
        btn.textContent = "\uD83D\uDD07 " + labels.resume;
      }
    }

    function renderTrendChips() {
      const area = document.getElementById("trend-chips-area");
      area.innerHTML = "";
      const topics = trendTopics?.[selectedAge];
      if (!topics) return;
      const container = document.createElement("div");
      container.className = "trend-container";
      const label = document.createElement("div");
      label.className = "trend-label";
      label.textContent = "\u6C17\u306B\u306A\u308B\u30C8\u30D4\u30C3\u30AF\u304C\u3042\u308C\u3070\u9078\u3093\u3067\u304F\u3060\u3055\u3044";
      container.appendChild(label);
      const chips = document.createElement("div");
      chips.className = "trend-chips";
      const allTopics = [...topics, FREE_TALK];
      for (const topic of allTopics) {
        const chip = document.createElement("button");
        chip.className = "trend-chip";
        chip.type = "button";
        chip.textContent = topic === FREE_TALK ? "\uD83D\uDCAC \u30D5\u30EA\u30FC\u30C8\u30FC\u30AF" : topic;
        chip.onclick = () => {
          selectedTopic = (selectedTopic === topic) ? null : topic;
          chips.querySelectorAll(".trend-chip").forEach(c => {
            const val = c.dataset.topic;
            c.classList.toggle("trend-chip--active", val === (selectedTopic || ""));
          });
        };
        chip.dataset.topic = topic;
        chips.appendChild(chip);
      }
      container.appendChild(chips);
      area.appendChild(container);
    }

    function showMicToggle() {
      const btn = document.getElementById("mic-toggle");
      btn.classList.add("visible");
      btn.classList.remove("muted");
      updateMicLabel();
    }

    function hideMicToggle() {
      const btn = document.getElementById("mic-toggle");
      btn.classList.remove("visible", "muted");
    }

    // Countdown animation
    const COUNTDOWN_FINAL = { en: "Let's Begin!", id: "Ayo Mulai!", ja: "スタート!!" };
    let countdownTimer = null;

    function startCountdown(lang) {
      const overlay = document.getElementById("countdown-overlay");
      const numEl = document.getElementById("countdown-num");
      const labelEl = document.getElementById("countdown-label");
      overlay.classList.add("active");
      labelEl.textContent = "Connecting...";
      let count = 5;

      function showNum() {
        numEl.classList.remove("pop", "final");
        void numEl.offsetWidth;
        numEl.textContent = count;
        numEl.classList.add("pop");
        if (count > 0) {
          count--;
          countdownTimer = setTimeout(showNum, 800);
        } else {
          countdownTimer = setTimeout(() => {
            numEl.classList.remove("pop");
            void numEl.offsetWidth;
            numEl.classList.add("final");
            numEl.textContent = COUNTDOWN_FINAL[lang] || COUNTDOWN_FINAL.en;
            labelEl.textContent = "";
            countdownTimer = setTimeout(finishCountdown, 1200);
          }, 700);
        }
      }
      showNum();
    }

    function finishCountdown() {
      clearTimeout(countdownTimer);
      countdownTimer = null;
      const overlay = document.getElementById("countdown-overlay");
      overlay.style.animation = "countdown-fade-out 0.4s ease forwards";
      setTimeout(() => {
        overlay.classList.remove("active");
        overlay.style.animation = "";
      }, 400);
    }


    // Track which elements already have translation to prevent duplicates
    const translated = new WeakSet();

    // Word list
    const wordSet = new Set();
    const bookmarkedWords = new Set();

    const STOP_WORDS = new Set([
      "i","me","my","you","your","he","she","it","we","they","them","his","her","its","our","their",
      "a","an","the","is","am","are","was","were","be","been","being",
      "do","does","did","have","has","had","will","would","shall","should","can","could","may","might","must",
      "to","of","in","for","on","at","by","with","from","as","into","about","up","out","so",
      "and","but","or","if","not","no","yes","oh","hey","hi","hello","wow","yeah","ok","okay",
      "that","this","what","how","who","when","where","why","which",
      "just","very","really","too","also","well","like","know","think","get","got","go","going",
    ]);

    function extractWords(text) {
      return text
        .replace(/[^a-zA-Z'\- ]/g, " ")
        .split(/\s+/)
        .filter(w => w.length > 1 && !STOP_WORDS.has(w.toLowerCase()));
    }

    function addWordsFromAiText(text) {
      const words = extractWords(text);
      let added = false;
      for (const word of words) {
        const key = word.toLowerCase();
        if (!wordSet.has(key)) {
          wordSet.add(key);
          added = true;
          const chip = document.createElement("button");
          chip.className = "word-chip";
          if (bookmarkedWords.has(key)) chip.classList.add("bookmarked");
          chip.textContent = word;
          chip.dataset.word = key;
          chip.onclick = () => {
            chip.classList.toggle("bookmarked");
            if (chip.classList.contains("bookmarked")) {
              bookmarkedWords.add(key);
            } else {
              bookmarkedWords.delete(key);
            }
            updateBookmarkCount();
          };
          document.getElementById("word-list").appendChild(chip);
        }
      }
      if (added) updateBookmarkCount();
    }

    function updateBookmarkCount() {
      const total = wordSet.size;
      const marked = bookmarkedWords.size;
      document.getElementById("word-count").textContent = marked > 0 ? `${marked}/${total}` : String(total);
    }

    // Mobile toggle
    document.getElementById("wordpanel-toggle").onclick = () => {
      document.getElementById("wordpanel").classList.toggle("open");
    };

    // Playback
    let playQueue = [];
    let isPlaying = false;
    let playCtx = null;

    function goBack() {
      if (!ws) return;
      clearTimeout(countdownTimer);
      countdownTimer = null;
      document.getElementById("countdown-overlay").classList.remove("active");
      document.getElementById("countdown-overlay").style.animation = "";
      clearTimeout(lateTranslateTimer);
      lateTranslateTimer = null;
      playQueue = [];
      isPlaying = false;
      playCtx?.close();
      playCtx = null;
      hideMicToggle();
      stopRecording();
      audioCtx?.close();
      audioCtx = null;
      selectedTopic = null;
      ws.close();
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function addMsg(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      document.getElementById("transcript").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    async function fetchTranslation(text, msgEl) {
      if (currentLang === "ja") return;
      if (translated.has(msgEl)) return;
      translated.add(msgEl);

      try {
        const res = await fetch("/api/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, sourceLang: currentLang }),
        });
        const data = await res.json();
        if (!res.ok) {
          console.warn("Translation error:", res.status, data.error);
          translated.delete(msgEl);
          return;
        }
        if (data.translation) {
          const translationDiv = document.createElement("div");
          translationDiv.className = "msg__translation";
          translationDiv.textContent = data.translation;
          msgEl.appendChild(translationDiv);
          msgEl.scrollIntoView({ behavior: "smooth" });
        }
      } catch (e) {
        console.error("Translation failed:", e);
        translated.delete(msgEl);
      }
    }

    // Render text with double-quoted phrases highlighted
    function renderHighlightedText(container, text) {
      container.textContent = "";
      const parts = text.split(/(".*?")/g);
      for (const part of parts) {
        if (part.startsWith('"') && part.endsWith('"') && part.length > 1) {
          const span = document.createElement("span");
          span.className = "msg__highlight";
          span.textContent = part;
          container.appendChild(span);
        } else {
          container.appendChild(document.createTextNode(part));
        }
      }
    }

    function handleAiText(text) {
      const targetMsg = currentAiMsg || awaitingTranslation;
      if (!targetMsg) {
        currentAiMsg = document.createElement("div");
        currentAiMsg.className = "msg ai";
        currentAiText = "";
        const textSpan = document.createElement("span");
        textSpan.className = "msg__original";
        currentAiMsg.appendChild(textSpan);
        document.getElementById("transcript").appendChild(currentAiMsg);
      } else if (!currentAiMsg) {
        currentAiMsg = awaitingTranslation;
        currentAiText = "";
      }
      const isLate = awaitingTranslation !== null;
      awaitingTranslation = null;
      currentAiText += text;
      renderHighlightedText(currentAiMsg.querySelector(".msg__original"), currentAiText);
      currentAiMsg.scrollIntoView({ behavior: "smooth" });
      addWordsFromAiText(text);
      if (isLate) {
        clearTimeout(lateTranslateTimer);
        const el = currentAiMsg;
        const txt = currentAiText;
        lateTranslateTimer = setTimeout(() => {
          fetchTranslation(txt, el);
        }, 300);
      }
    }

    function handleTurnComplete() {
      if (currentAiMsg && currentAiText) {
        fetchTranslation(currentAiText, currentAiMsg);
        currentAiMsg = null;
        currentAiText = "";
      } else if (currentAiMsg) {
        awaitingTranslation = currentAiMsg;
        currentAiMsg = null;
        currentAiText = "";
      }
    }

    async function start(voice) {
      if (ws !== null) return;
      currentLang = selectedLang;
      document.querySelectorAll(".char-card").forEach(c => c.setAttribute("aria-disabled", "true"));
      setStatus("Connecting...");

      // Run mic acquisition and session fetch in parallel
      let session;
      const [micResult, sessionResult] = await Promise.allSettled([
        (async () => {
          audioCtx = new AudioContext({ sampleRate: 16000 });
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        })(),
        fetch("/api/session").then(r => { if (!r.ok) throw new Error("Session failed: " + r.status); return r.json(); }),
      ]);

      if (micResult.status === "rejected") {
        setStatus("\u30de\u30a4\u30af\u306e\u8a31\u53ef\u304c\u5fc5\u8981\u3067\u3059\u3002");
        document.querySelectorAll(".char-card").forEach(c => c.removeAttribute("aria-disabled"));
        return;
      }
      if (sessionResult.status === "rejected") {
        setStatus("\u63a5\u7d9a\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u30ea\u30ed\u30fc\u30c9\u3057\u3066\u304f\u3060\u3055\u3044\u3002");
        audioCtx?.close(); audioCtx = null;
        mediaStream?.getTracks().forEach(t => t.stop());
        document.querySelectorAll(".char-card").forEach(c => c.removeAttribute("aria-disabled"));
        return;
      }
      session = sessionResult.value;

      // Switch to conversation view & start countdown
      document.getElementById("controls").classList.add("hidden");
      document.getElementById("conversation").classList.add("active");
      document.getElementById("back-btn").classList.add("visible");
      startCountdown(currentLang);

      // Connect directly to Gemini WebSocket
      ws = new WebSocket(session.wsUrl);

      ws.onopen = () => {
        const systemPrompt = getSystemPrompt(voice, currentLang);
        ws.send(JSON.stringify({
          setup: {
            model: session.model,
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                voiceConfig: {
                  prebuiltVoiceConfig: { voiceName: voice },
                },
              },
            },
            systemInstruction: {
              parts: [{ text: systemPrompt }],
            },
          },
        }));
        setStatus("Waiting for AI...");
      };

      ws.onmessage = async (e) => {
        let msg;
        try {
          // Gemini may send data as Blob in browser; convert to string first
          const raw = typeof e.data === "string" ? e.data : await e.data.text();
          msg = JSON.parse(raw);
        } catch {
          return;
        }

        // Gemini setup complete
        if ("setupComplete" in msg) {
          setStatus("\u6e96\u5099\u304c\u3067\u304d\u305f\u3089\u8a71\u3057\u304b\u3051\u3066\u307f\u3066\u304f\u3060\u3055\u3044\u3002");
          startRecording();
          showMicToggle();
          return;
        }

        // Gemini server content
        if ("serverContent" in msg) {
          const sc = msg.serverContent;

          if (sc.modelTurn?.parts) {
            for (const part of sc.modelTurn.parts) {
              if (part.inlineData) {
                queueAudio(part.inlineData.data);
              }
              if (part.text) {
                handleAiText(part.text);
              }
            }
          }

          // inputTranscription: skip (unreliable for Japanese)

          if (sc.outputTranscription?.text) {
            handleAiText(sc.outputTranscription.text);
          }

          if (sc.turnComplete) {
            handleTurnComplete();
          }
        }
      };

      ws.onclose = () => {
        ws = null;
        clearTimeout(lateTranslateTimer);
        lateTranslateTimer = null;
        setStatus("\u8a71\u3057\u76f8\u624b\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044");
        hideMicToggle();
        stopRecording();
        document.getElementById("controls").classList.remove("hidden");
        document.getElementById("conversation").classList.remove("active");
        document.getElementById("back-btn").classList.remove("visible");
        document.getElementById("transcript").innerHTML = "";
        document.querySelectorAll(".char-card").forEach(c => c.removeAttribute("aria-disabled"));
        // Reset to character selection view
        document.querySelector(".controls__cards").style.display = "";
        document.getElementById("char-config").style.display = "none";
        currentAiMsg = null;
        currentAiText = "";
        awaitingTranslation = null;
      };

      ws.onerror = () => {
        setStatus("Connection failed");
      };
    }

    function startRecording() {
      const source = audioCtx.createMediaStreamSource(mediaStream);
      scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
      scriptNode.onaudioprocess = (e) => {
        if (!isRecording || ws?.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
        }
        const bytes = new Uint8Array(int16.buffer);
        let binary = "";
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        const b64 = btoa(binary);
        // Send audio directly to Gemini
        ws.send(JSON.stringify({
          realtimeInput: {
            audio: {
              data: b64,
              mimeType: "audio/pcm;rate=16000",
            },
          },
        }));
      };

      source.connect(scriptNode);
      scriptNode.connect(audioCtx.destination);
      isRecording = true;
    }

    function stopRecording() {
      isRecording = false;
      scriptNode?.disconnect();
      mediaStream?.getTracks().forEach((t) => t.stop());
    }

    // Audio playback: PCM 24kHz from Gemini — single AudioContext reused
    function queueAudio(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
      playQueue.push(float32);
      if (!isPlaying) playNext();
    }

    function playNext() {
      if (playQueue.length === 0) {
        isPlaying = false;
        setStatus("\u6e96\u5099\u304c\u3067\u304d\u305f\u3089\u8a71\u3057\u304b\u3051\u3066\u307f\u3066\u304f\u3060\u3055\u3044\u3002");
        return;
      }
      isPlaying = true;
      const samples = playQueue.shift();

      // Reuse single playback context to avoid browser AudioContext limit
      if (!playCtx || playCtx.state === "closed") {
        playCtx = new AudioContext({ sampleRate: 24000 });
      }
      const buf = playCtx.createBuffer(1, samples.length, 24000);
      buf.getChannelData(0).set(samples);
      const src = playCtx.createBufferSource();
      src.buffer = buf;
      src.connect(playCtx.destination);
      src.onended = () => playNext();
      src.start();
    }
  </script>
</body>
</html>
